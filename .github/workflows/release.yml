name: Multiplatform build
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: build:win
          - os: macos-latest
            command: build:mac
          - os: ubuntu-latest
            command: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        with:
          name: cafetal-os-${{ matrix.os }}
          path: dist/*
